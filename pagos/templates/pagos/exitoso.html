<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pago aprobado — Punto Asis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f3f2ee; font-family: 'Inter', sans-serif; padding: 1.5rem;
    }

    .card {
      background: #fff; border-radius: 20px; padding: 2.8rem 2.2rem 2.4rem;
      text-align: center; max-width: 420px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    /* Icono animado */
    .check-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.4rem;
      box-shadow: 0 4px 20px rgba(22,163,74,0.35);
      animation: pop .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .check-wrap svg { width: 36px; height: 36px; }

    .badge {
      display: inline-flex; align-items: center; gap: .35rem;
      background: #dcfce7; color: #15803d;
      border-radius: 999px; padding: .28rem .95rem;
      font-size: .72rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; margin-bottom: 1.1rem;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #16a34a; }

    h1 {
      font-family: 'DM Serif Display', serif; font-size: 1.75rem;
      color: #0f172a; margin-bottom: .5rem; line-height: 1.2;
    }
    p {
      color: #64748b; font-size: .88rem; line-height: 1.6;
      margin-bottom: 1.8rem;
    }

    .divider { border: none; border-top: 1px solid #f1f5f9; margin: 0 0 1.6rem; }

    /* Atribución MP */
    .mp-brand {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      font-size: .72rem; color: #94a3b8; margin-bottom: 1.6rem;
    }
    .mp-brand svg { opacity: .7; }

    .btn {
      display: inline-flex; align-items: center; gap: .45rem;
      background: #0f172a; color: #fff;
      padding: .72rem 1.8rem; border-radius: 10px; text-decoration: none;
      font-weight: 600; font-size: .88rem; transition: background .15s;
    }
    .btn:hover { background: #1e293b; }
    .btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check-wrap">
      <svg viewBox="0 0 36 36" fill="none">
        <path d="M8 18.5L14.5 25L28 11" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <span class="badge"><span class="badge-dot"></span>Pago aprobado</span>

    <h1>¡Recarga exitosa!</h1>
    <p>Tu pago fue procesado por MercadoPago.<br>
       El saldo fue <strong>acreditado automáticamente</strong> en tu cuenta.</p>

    <hr class="divider">

    <div class="mp-brand">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect width="18" height="18" rx="4" fill="#009ee3"/>
        <path d="M4 9.5c0-2.485 2.015-4.5 4.5-4.5S13 7.015 13 9.5 10.985 14 8.5 14 4 11.985 4 9.5z" fill="#fff"/>
        <path d="M7 8.25l2.5 1.25L7 10.75V8.25z" fill="#009ee3"/>
      </svg>
      Pago procesado con MercadoPago
    </div>

    <a href="/" class="btn">
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M8 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Ir al inicio
    </a>
  </div>
</body>
</html>
